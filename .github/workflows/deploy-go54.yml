name: Deploy to Go54 (cPanel)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          extensions: mbstring, pdo, pdo_mysql, sqlite3, bcmath, ctype, fileinfo, tokenizer, xml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.worldensettler.com.ng
          username: akandevictor@worldensettler.com.ng
          password: Okikiola1994@
          protocol: ftp
          port: 21
          server-dir: /
          local-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            .env.*
            tests/**
            storage/logs/**
            storage/framework/cache/data/**
            storage/framework/sessions/**
            storage/framework/testing/**
            storage/framework/views/**
            public/hot
            database/*.sqlite
